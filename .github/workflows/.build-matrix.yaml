name: Build Matrix

on:
  workflow_call:
    inputs:
      os-matrix:
        description: 'OS matrix for builds'
        required: false
        type: string
        # Windows is intentionally excluded — use .build-windows.yaml (GoReleaser cross-compile) for Windows binaries.
        default: '["ubuntu-latest", "macos-latest"]'
      upload-artifact:
        description: 'Whether to upload artifacts'
        required: false
        type: boolean
        default: false
      artifact-name-prefix:
        description: 'Prefix for artifact names'
        required: false
        type: string
        default: 'dr'

# S5: deny all by default; jobs opt-in to what they need.
permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: ${{ fromJSON(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    name: (${{ matrix.os }})
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go and Task
        uses: ./.github/actions/setup

      - name: Build the DR CLI Binary
        run: task build

      - name: Check if binary runs without errors
        shell: bash
        run: |
          ./dist/dr --help

      - name: Upload Binary Artifact (Ubuntu)
        if: inputs.upload-artifact && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact-name-prefix }}-ubuntu
          path: dist/dr
          retention-days: 1

      - name: Upload Binary Artifact (macOS)
        if: inputs.upload-artifact && matrix.os == 'macos-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact-name-prefix }}-macos
          path: dist/dr
          retention-days: 1

      - name: Upload Binary Artifact (Windows)
        if: inputs.upload-artifact && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact-name-prefix }}-windows
          path: dist/dr.exe
          retention-days: 1
