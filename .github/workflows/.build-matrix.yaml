name: Build Matrix

on:
  workflow_call:
    inputs:
      os-matrix:
        description: 'OS matrix for builds'
        required: false
        type: string
        default: '["ubuntu-latest", "macos-latest", "windows-latest"]'
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.26.4'
      upload-artifact:
        description: 'Whether to upload artifacts'
        required: false
        type: boolean
        default: false
      artifact-name-prefix:
        description: 'Prefix for artifact names'
        required: false
        type: string
        default: 'dr'

# S5: deny all by default; jobs opt-in to what they need.
permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: ${{ fromJSON(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    name: (${{ matrix.os }})
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Taskfile
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Build the DR CLI Binary
        run: task build

      - name: Check if binary runs without errors
        shell: bash
        run: |
          ./dist/dr --help

      - name: Upload Binary Artifact (Ubuntu)
        if: inputs.upload-artifact && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact-name-prefix }}-ubuntu
          path: dist/dr
          retention-days: 1

      - name: Upload Binary Artifact (macOS)
        if: inputs.upload-artifact && matrix.os == 'macos-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact-name-prefix }}-macos
          path: dist/dr
          retention-days: 1

      - name: Upload Binary Artifact (Windows)
        if: inputs.upload-artifact && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact-name-prefix }}-windows
          path: dist/dr.exe
          retention-days: 1
