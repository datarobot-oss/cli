name: PR Checks

concurrency:
  group: ${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main

# S5: deny all by default; jobs opt-in to what they need.
permissions:
  contents: read

jobs:

  # This job detects what types of files were changed in the PR and sets outputs
  # that other jobs can use to conditionally run only when relevant files were changed.
  detect-changes:
    runs-on: ubuntu-latest
    name: Detect Changes
    outputs:
      completion: ${{ steps.changes.outputs.completion }}
      dotenv: ${{ steps.changes.outputs.dotenv }}
      templates: ${{ steps.changes.outputs.templates }}
      auth: ${{ steps.changes.outputs.auth }}
      go_code: ${{ steps.changes.outputs.go_code }}
      deps: ${{ steps.changes.outputs.deps }}
      install_sh: ${{ steps.changes.outputs.install_sh }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Detect file changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: changes
        with:
          filters: |
            completion:
              - 'cmd/self/completion/**'
              - 'goreleaser.yaml'  # Homebrew post-install hook runs `dr self completion install`
            dotenv:
              - 'cmd/dotenv/**'
            templates:
              - 'cmd/templates/**'
            auth:
              - 'cmd/auth/**'
            go_code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            deps:
              - 'cmd/dependencies/**'
              - 'internal/dependencies/**'
              - 'internal/tools/**'
              - 'smoke_test_scripts/run_deps_install_smoke_test.sh'
            install_sh:
              - 'install.sh'
              - 'smoke_test_scripts/run_install_integration_test.sh'

  lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.go_code == 'true'
    runs-on: ubuntu-latest
    name: Lint Code

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.4'

      - name: Install Taskfile
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get golangci-lint version
        id: golangci-version
        run: |
          echo "version=$(grep 'GOLANGCI_LINT_VERSION' Taskfile.yaml | grep -oP 'v[\d.]+')" >> "$GITHUB_OUTPUT"

      - name: Cache golangci-lint binary and analysis
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            tmp/bin/golangci-lint
            ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ steps.golangci-version.outputs.version }}-${{ hashFiles('**/*.go', 'go.sum', '.golangci.yml') }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-${{ steps.golangci-version.outputs.version }}-

      - name: Run all checks
        run: |
          task lint

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.go_code == 'true'
    runs-on: ubuntu-latest
    name: Run Tests
    permissions:
      contents: read
      actions: write   # actions/cache (save)

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.4'

      - name: Install Taskfile
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # In order:
          # * Module download cache
          # * Build cache (Linux)
          # * Build cache (Mac)
          # * Build cache (Windows)
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/Library/Caches/go-build
            %LocalAppData%\go-build
            bin
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run Golang Test Command
        run: |
          task test

  copyright:
    runs-on: ubuntu-latest
    name: Copyrights

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Check License Header
        uses: apache/skywalking-eyes/header@8e837beb243c264ffcd5ea3abd3d5d8975cd0077 # main 2025-01-13
        with:
          config: .licenserc.yaml

  generate:
    needs: detect-changes
    if: needs.detect-changes.outputs.go_code == 'true'
    runs-on: ubuntu-latest
    name: Ensure Code Generated

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Taskfile
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.4'

      - name: Install Envdoc
        run: |
          go install github.com/g4s8/envdoc@latest

      - name: Add Go Bin to PATH
        run: |
          echo "${{ github.workspace }}/go/bin" >> "$GITHUB_PATH"

      - name: Ensure Code Generated
        run: |
          task gen-check

  build:
    needs: detect-changes
    name: Build Binaries
    # Cross-compile all platforms on a single Ubuntu runner (cheaper than 3-OS matrix).
    # Completion-tests depends on this job for the dr-ubuntu artifact.
    if: needs.detect-changes.outputs.go_code == 'true' || needs.detect-changes.outputs.completion == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.4'

      - name: Build all platforms with GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --snapshot --clean

      - name: Verify Linux binary runs
        run: ./dist/linux_linux_amd64_v1/dr --help

      - name: Upload Linux binary (used by completion-tests)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dr-ubuntu
          path: dist/linux_linux_amd64_v1/dr
          retention-days: 1
  auto-label:
    needs: detect-changes
    if: needs.detect-changes.outputs.go_code == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    name: Auto Label Go Changes
    permissions:
      pull-requests: write
    steps:
      - name: Add label for Go code changes
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['go']
            })

  dependabot-reminder:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    name: Dependabot Smoke Test Reminder
    permissions:
      pull-requests: write
    steps:
      - name: Comment smoke test instructions
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '👋 **Maintainer reminder:** Smoke tests cannot run automatically on dependabot PRs due to GitHub secret restrictions.\n\nBefore merging, add the `run-smoke-tests` label and wait for the smoke tests to pass.'
            });

  deps-install-smoke-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.deps == 'true'
    uses: ./.github/workflows/.deps-install-smoke-tests-matrix.yaml
    # S1: called workflow declares no secrets — omit secrets block.
  install-integration-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.install_sh == 'true'
    uses: ./.github/workflows/.install-integration-tests-matrix.yaml
    # S1: called workflow declares no secrets — omit secrets block.
  completion-tests:
    needs: [build, detect-changes]
    if: needs.detect-changes.outputs.completion == 'true'
    runs-on: ubuntu-latest
    name: Test Completions
    permissions:
      contents: read
      actions: read    # actions/download-artifact

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download Binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dr-ubuntu
          path: /tmp/dr-bin

      - name: Move Binary to PATH
        run: |
          chmod +x /tmp/dr-bin/dr
          sudo mv /tmp/dr-bin/dr /usr/local/bin/dr

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y expect bash-completion

      - name: Install Taskfile
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test completion generation
        shell: bash
        run: |
          # Test bash completion generation and content
          dr self completion bash > /tmp/dr-bash.sh

          # Check if we have the expected __start_dr() function
          if grep -q "__start_dr()" /tmp/dr-bash.sh; then
            echo "✓ Bash completion has expected __start_dr() function"
          else
            echo "✗ Bash completion missing __start_dr() function"
            exit 1
          fi

          # Validate bash syntax
          bash -n /tmp/dr-bash.sh && echo "✓ Bash completion syntax valid"


      - name: Run completion expect tests
        run: |
          expect ./smoke_test_scripts/expect_completion.exp
