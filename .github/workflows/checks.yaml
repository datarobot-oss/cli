name: PR Checks

concurrency:
  group: ${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - main

jobs:

  # This job detects what types of files were changed in the PR and sets outputs
  # that other jobs can use to conditionally run only when relevant files were changed.
  detect-changes:
    runs-on: ubuntu-latest
    name: Detect Changes
    outputs:
      completion: ${{ steps.changes.outputs.completion }}
      dotenv: ${{ steps.changes.outputs.dotenv }}
      templates: ${{ steps.changes.outputs.templates }}
      auth: ${{ steps.changes.outputs.auth }}
      go_code: ${{ steps.changes.outputs.go_code }}
      deps: ${{ steps.changes.outputs.deps }}
      install_sh: ${{ steps.changes.outputs.install_sh }}
      github_dir: ${{ steps.changes.outputs.github_dir }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            completion:
              - 'cmd/self/completion/**'
              - 'goreleaser.yaml'  # Homebrew post-install hook runs `dr self completion install`
            dotenv:
              - 'cmd/dotenv/**'
            templates:
              - 'cmd/templates/**'
            auth:
              - 'cmd/auth/**'
            go_code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            deps:
              - 'cmd/dependencies/**'
              - 'internal/dependencies/**'
              - 'internal/tools/**'
              - 'smoke_test_scripts/run_deps_install_smoke_test.sh'
            install_sh:
              - 'install.sh'
              - 'smoke_test_scripts/run_install_integration_test.sh'
            github_dir:
              - '.github/**'

  # Guards changes under `.github/` (workflows, actions, CODEOWNERS, branch-protection
  # configs, etc.) against fork PRs and non-maintainer authors. These files control
  # CI behavior and secret handling, so modifications from untrusted sources must be
  # explicitly approved by a maintainer applying the `approved-workflow-changes` label.
  #
  # Label trust: GitHub allows triage-level users (not just maintainers) to add labels,
  # so the guard does not trust label presence alone — it inspects the issue timeline
  # to find who applied the label and verifies that actor has write/maintain/admin.
  # A non-maintainer's label application is rejected and the label is auto-removed.
  workflow-changes-guard:
    needs: detect-changes
    if: needs.detect-changes.outputs.github_dir == 'true'
    runs-on: ubuntu-latest
    name: Guard .github/ Changes
    permissions:
      pull-requests: write  # needed to remove an unauthorized approval label
      issues: read
      contents: read
    steps:
      - name: Verify maintainer-authored or explicitly approved
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const isFork = pr.head.repo.full_name !== pr.base.repo.full_name;
            const approvalLabel = 'approved-workflow-changes';
            const maintainerPerms = ['write', 'maintain', 'admin'];

            async function permissionOf(username) {
              try {
                const res = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  username,
                });

                return res.data.permission;
              } catch (e) {
                console.log(`Could not resolve permission for @${username}: ${e.message}`);

                return 'none';
              }
            }

            const authorPermission = await permissionOf(pr.user.login);
            const isAuthorMaintainer = maintainerPerms.includes(authorPermission);

            // List changed files under .github/ for diagnostics.
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            const changedGithubFiles = files
              .filter(f => f.filename.startsWith('.github/'))
              .map(f => `  - ${f.filename}`)
              .join('\n');

            console.log(`PR author: @${pr.user.login} (permission: ${authorPermission}, maintainer: ${isAuthorMaintainer})`);
            console.log(`Fork PR: ${isFork}`);
            console.log(`Changed .github/ files:\n${changedGithubFiles}`);

            if (!isFork && isAuthorMaintainer) {
              console.log('✅ Non-fork PR authored by a maintainer — allowed.');

              return;
            }

            // Determine whether the approval label is present AND was applied by a maintainer.
            // We walk the issue events timeline to find the most recent `labeled` event for
            // our approval label and check that actor's permission. This prevents triage-level
            // users from self-approving by applying the label themselves.
            const events = await github.paginate(github.rest.issues.listEvents, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            // Most recent `labeled`/`unlabeled` event for the approval label decides current state.
            let labelerLogin = null;
            let labelCurrentlyApplied = false;

            for (const ev of events) {
              if (!ev.label || ev.label.name !== approvalLabel) {
                continue;
              }

              if (ev.event === 'labeled') {
                labelCurrentlyApplied = true;
                labelerLogin = ev.actor && ev.actor.login;
              } else if (ev.event === 'unlabeled') {
                labelCurrentlyApplied = false;
                labelerLogin = null;
              }
            }

            if (labelCurrentlyApplied && labelerLogin) {
              const labelerPermission = await permissionOf(labelerLogin);
              const isLabelerMaintainer = maintainerPerms.includes(labelerPermission);

              console.log(`Approval label applied by @${labelerLogin} (permission: ${labelerPermission}, maintainer: ${isLabelerMaintainer})`);

              if (isLabelerMaintainer) {
                console.log(`✅ Changes explicitly approved via '${approvalLabel}' label by a maintainer.`);

                return;
              }

              // Unauthorized application — remove the label so it can't be re-used as a bypass.
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: approvalLabel,
                });

                console.log(`Removed '${approvalLabel}' label applied by non-maintainer @${labelerLogin}.`);
              } catch (e) {
                console.log(`Failed to remove '${approvalLabel}' label: ${e.message}`);
              }

              core.setFailed(
                `The '${approvalLabel}' label was applied by @${labelerLogin}, ` +
                `who is not a maintainer (permission: \`${labelerPermission}\`). ` +
                `The label has been removed. A user with write/maintain/admin permission ` +
                `must re-apply it to approve these workflow changes.`
              );

              return;
            }

            const reason = isFork
              ? `This PR comes from a fork (\`${pr.head.repo.full_name}\`)`
              : `PR author @${pr.user.login} is not a maintainer (permission: \`${authorPermission}\`)`;

            core.setFailed(
              `Changes under \`.github/\` are restricted.\n` +
              `${reason}, so modifications to CI workflows / actions / CODEOWNERS ` +
              `require explicit maintainer review.\n\n` +
              `Changed files:\n${changedGithubFiles}\n\n` +
              `A maintainer (write/maintain/admin permission) must review these changes ` +
              `and add the \`${approvalLabel}\` label to unblock this check.`
            );

  lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.go_code == 'true'
    runs-on: ubuntu-latest
    name: Lint Code

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: GoReleaser Check
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: check

      - name: Install Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run all checks
        run: |
          task lint

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.go_code == 'true'
    runs-on: ubuntu-latest
    name: Run Tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Install Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@v4
        with:
          # In order:
          # * Module download cache
          # * Build cache (Linux)
          # * Build cache (Mac)
          # * Build cache (Windows)
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/Library/Caches/go-build
            %LocalAppData%\go-build
            bin
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run Golang Test Command
        run: |
          task test

  copyright:
    runs-on: ubuntu-latest
    name: Copyrights

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check License Header
        uses: apache/skywalking-eyes/header@main
        with:
          config: .licenserc.yaml

  generate:
    needs: detect-changes
    if: needs.detect-changes.outputs.go_code == 'true'
    runs-on: ubuntu-latest
    name: Ensure Code Generated

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Install Envdoc
        run: |
          go install github.com/g4s8/envdoc@latest

      - name: Add Go Bin to PATH
        run: |
          echo "${{ github.workspace }}/go/bin" >> "$GITHUB_PATH"

      - name: Ensure Code Generated
        run: |
          task gen-check

  build:
    needs: detect-changes
    name: Build Binaries
    # Completion-tests is dependent on Build, so we need to build binaries if either code or completion-related files changed.
    if: needs.detect-changes.outputs.go_code == 'true' || needs.detect-changes.outputs.completion == 'true'
    uses: ./.github/workflows/.build-matrix.yaml
    with:
      go-version: '1.26.3'
      upload-artifact: true
      artifact-name-prefix: 'dr'
    secrets: inherit

  auto-label:
    needs: detect-changes
    if: needs.detect-changes.outputs.go_code == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    name: Auto Label Go Changes
    permissions:
      pull-requests: write
    steps:
      - name: Add label for Go code changes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['go']
            })

  dependabot-reminder:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    name: Dependabot Smoke Test Reminder
    permissions:
      pull-requests: write
    steps:
      - name: Comment smoke test instructions
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '👋 **Maintainer reminder:** Smoke tests cannot run automatically on dependabot PRs due to GitHub secret restrictions.\n\nBefore merging, add the `run-smoke-tests` label and wait for the smoke tests to pass.'
            });

  deps-install-smoke-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.deps == 'true'
    uses: ./.github/workflows/.deps-install-smoke-tests-matrix.yaml
    secrets: inherit

  install-integration-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.install_sh == 'true'
    uses: ./.github/workflows/.install-integration-tests-matrix.yaml
    secrets: inherit

  completion-tests:
    needs: [build, detect-changes]
    if: needs.detect-changes.outputs.completion == 'true'
    runs-on: ubuntu-latest
    name: Test Completions
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Binary
        uses: actions/download-artifact@v4
        with:
          name: dr-ubuntu
          path: /tmp/dr-bin

      - name: Move Binary to PATH
        run: |
          chmod +x /tmp/dr-bin/dr
          sudo mv /tmp/dr-bin/dr /usr/local/bin/dr

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y expect bash-completion

      - name: Install Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test completion generation
        shell: bash
        run: |
          # Test bash completion generation and content
          dr self completion bash > /tmp/dr-bash.sh

          # Check if we have the expected __start_dr() function
          if grep -q "__start_dr()" /tmp/dr-bash.sh; then
            echo "✓ Bash completion has expected __start_dr() function"
          else
            echo "✗ Bash completion missing __start_dr() function"
            exit 1
          fi

          # Validate bash syntax
          bash -n /tmp/dr-bash.sh && echo "✓ Bash completion syntax valid"


      - name: Run completion expect tests
        run: |
          expect ./smoke_test_scripts/expect_completion.exp
