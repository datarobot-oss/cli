name: Dependency Install Smoke Tests Matrix

on:
  workflow_call:

# S5: deny all by default; jobs opt-in to what they need.
permissions:
  contents: read

jobs:
  deps-install-smoke-tests:
    strategy:
      matrix:
        sys:
          - { os: ubuntu-latest, shell: bash }
          - { os: macos-latest,  shell: "zsh {0}" }
    defaults:
      run:
        shell: ${{ matrix.sys.shell }}
    runs-on: ${{ matrix.sys.os }}
    name: Dependency Install Smoke Tests (${{ matrix.sys.os }})
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go and Task
        uses: datarobot-oss/cli/.github/actions/setup@main

      - name: Build binary
        run: task build

      - name: Run dependency install smoke tests
        run: |
          DR_BIN=./dist/dr bash smoke_test_scripts/run_deps_install_smoke_test.sh
