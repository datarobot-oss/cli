name: Dependency Install Smoke Tests Matrix

on:
  workflow_call:

# S5: deny all by default; jobs opt-in to what they need.
permissions:
  contents: read

jobs:
  deps-install-smoke-tests:
    strategy:
      matrix:
        sys:
          - { os: ubuntu-latest, shell: bash }
          - { os: macos-latest,  shell: "zsh {0}" }
    defaults:
      run:
        shell: ${{ matrix.sys.shell }}
    runs-on: ${{ matrix.sys.os }}
    name: Dependency Install Smoke Tests (${{ matrix.sys.os }})
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binary
        run: task build

      - name: Run dependency install smoke tests
        run: |
          DR_BIN=./dist/dr bash smoke_test_scripts/run_deps_install_smoke_test.sh
