name: Smoke Tests Matrix

on:
  workflow_call:
    inputs:
      os-matrix:
        description: 'OS matrix for smoke tests'
        required: false
        type: string
        default: '["ubuntu-latest", "macos-latest"]'
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.26.4'
      ref:
        description: 'Git ref to checkout (for fork PRs)'
        required: false
        type: string
    secrets:
      DR_API_TOKEN:
        required: true


# S5: deny all by default; jobs opt-in to what they need.
permissions:
  contents: read

jobs:
  smoke-test:
    strategy:
      matrix:
        sys:
          - { os: ubuntu-latest, shell: bash }
          - { os: macos-latest, shell: "zsh {0}" }
    defaults:
      run:
        shell: ${{ matrix.sys.shell }}
    runs-on: ${{ matrix.sys.os }}
    name: Run Smoke Tests (${{ matrix.sys.os }})
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Ubuntu - Install dependencies w/ apt-get
        if: matrix.sys.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y expect bash-completion

      - name: MacOS - Install dependencies w/ homebrew
        if: matrix.sys.os == 'macos-latest'
        run: |
          brew install expect bash-completion

      - name: Install yq
        uses: dcarbone/install-yq-action@4075b4dca348d74bd83f2bf82d30f25d7c54539b # v1.3.1

      - name: Install Taskfile
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Build and Install the DR CLI Binary
        run: |
          set -e
          task build
          LOCAL_BINARY=./dist/dr sh install.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Smoke Tests for Binary
        env:
          DR_API_TOKEN: ${{ secrets.DR_API_TOKEN }}
        run: |
          task smoke-test DR_API_TOKEN="$DR_API_TOKEN"
