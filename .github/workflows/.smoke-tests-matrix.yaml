name: Smoke Tests Matrix

on:
  workflow_call:
    inputs:
      os-matrix:
        description: 'OS matrix for smoke tests'
        required: false
        type: string
        default: '["ubuntu-latest", "macos-latest"]'
      ref:
        description: 'Git ref to checkout (for fork PRs)'
        required: false
        type: string
    secrets:
      DR_API_TOKEN:
        required: true


# S5: deny all by default; jobs opt-in to what they need.
permissions:
  contents: read

jobs:
  smoke-test:
    strategy:
      matrix:
        sys:
          - { os: ubuntu-latest, shell: bash }
          - { os: macos-latest, shell: "zsh {0}" }
    defaults:
      run:
        shell: ${{ matrix.sys.shell }}
    runs-on: ${{ matrix.sys.os }}
    name: Run Smoke Tests (${{ matrix.sys.os }})
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install smoke-test dependencies
        uses: ./.github/actions/install-deps

      - name: Set up Go and Task
        uses: ./.github/actions/setup

      - name: Build and Install the DR CLI Binary
        uses: ./.github/actions/install-dr-bin

      - name: Run Smoke Tests for Binary
        env:
          DR_API_TOKEN: ${{ secrets.DR_API_TOKEN }}
        run: |
          task smoke-test DR_API_TOKEN="$DR_API_TOKEN"
