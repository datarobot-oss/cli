name: Fork PR Smoke Tests (Manual Dispatch)

# This workflow allows maintainers to run smoke tests for fork PRs safely.
# Uses workflow_dispatch instead of pull_request_target to avoid secrets leakage.
# A maintainer triggers this manually from the Actions tab, providing the PR number.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to test'
        required: true
        type: number
      commit_sha:
        description: 'Exact commit SHA from the fork PR to test (leave empty to use PR head)'
        required: false
        type: string
      approver:
        description: 'Username of maintainer approving this test. Auto-filled by CI (leave empty for manual runs)'
        required: false
        type: string

# S5: deny all by default; jobs opt-in to what they need.
permissions: {}

jobs:
  check-permissions:
    runs-on: ubuntu-latest
    name: Check Caller Permissions
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Verify maintainer access
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const approver = '${{ inputs.approver }}'.trim();
            const actorToCheck = approver || context.actor;

            const result = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: actorToCheck,
            });
            const allowed = ['write', 'maintain', 'admin'];
            const permission = result.data.permission;
            if (!allowed.includes(permission)) {
              core.setFailed(
                `@${actorToCheck} has permission '${permission}' — ` +
                `maintainer access (write/maintain/admin) is required to run fork smoke tests.`
              );
              return;
            }
            console.log(`@${actorToCheck} has permission '${permission}' — proceeding.`);

  resolve-pr:
    needs: [check-permissions]
    runs-on: ubuntu-latest
    name: Resolve PR Details
    timeout-minutes: 5
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      is_fork: ${{ steps.resolve.outputs.is_fork }}
    permissions:
      pull-requests: read
    steps:
      - name: Resolve PR commit SHA
        id: resolve
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ inputs.pr_number }}
            });

            const isFork = pr.data.head.repo.full_name !== pr.data.base.repo.full_name;
            core.setOutput('is_fork', isFork.toString());

            const sha = '${{ inputs.commit_sha }}' || pr.data.head.sha;
            console.log(`PR #${{ inputs.pr_number }} — fork: ${isFork}, sha: ${sha}`);
            core.setOutput('sha', sha);

  # Security check before running tests with secrets
  security-scan:
    needs: resolve-pr
    if: needs.resolve-pr.outputs.is_fork == 'true'
    runs-on: ubuntu-latest
    name: Security Scan
    timeout-minutes: 15
    # S5: minimum permissions for SARIF upload
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout PR code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve-pr.outputs.sha }}
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        id: trivy_scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 #v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail if vulnerabilities found

      - name: Convert results to SARIF
        id: trivy_convert
        if: always()
        run: trivy convert --format sarif --output trivy-results.sarif trivy-results.json

      - name: Upload Trivy results
        id: trivy_upload
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Display vulnerability table
        if: always()
        run: trivy convert --format table trivy-results.json

      - name: Publish Trivy run summary
        if: always()
        env:
          TRIVY_SCAN_OUTCOME: ${{ steps.trivy_scan.outcome }}
          TRIVY_CONVERT_OUTCOME: ${{ steps.trivy_convert.outcome }}
          TRIVY_UPLOAD_OUTCOME: ${{ steps.trivy_upload.outcome }}
        run: |
          {
            echo "## Trivy scan summary"
            echo ""
            echo "| Stage | Outcome |"
            echo "| --- | --- |"
            echo "| Scan | \`${TRIVY_SCAN_OUTCOME}\` |"
            echo "| Convert to SARIF | \`${TRIVY_CONVERT_OUTCOME}\` |"
            echo "| Upload SARIF | \`${TRIVY_UPLOAD_OUTCOME}\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f trivy-results.json ]; then
            total="$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-results.json)"
            critical="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-results.json)"
            high="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-results.json)"

            {
              echo "### Vulnerability counts"
              echo ""
              echo "| Severity | Count |"
              echo "| --- | --- |"
              echo "| CRITICAL | ${critical} |"
              echo "| HIGH | ${high} |"
              echo "| Total | ${total} |"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::trivy-results.json was not created. The scan likely failed before producing output."
            echo "- trivy-results.json: missing" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Annotate Trivy failure reason
        if: failure()
        env:
          TRIVY_SCAN_OUTCOME: ${{ steps.trivy_scan.outcome }}
          TRIVY_CONVERT_OUTCOME: ${{ steps.trivy_convert.outcome }}
          TRIVY_UPLOAD_OUTCOME: ${{ steps.trivy_upload.outcome }}
        run: |
          if [ "${TRIVY_SCAN_OUTCOME}" = "failure" ]; then
            echo "::error title=Trivy scan failed::The 'Run Trivy vulnerability scanner' step failed. Check that step logs for scanner errors or vulnerability threshold failures."
          fi

          if [ "${TRIVY_CONVERT_OUTCOME}" = "failure" ]; then
            echo "::error title=SARIF conversion failed::The JSON-to-SARIF conversion failed. This often happens when trivy-results.json is missing or malformed."
          fi

          if [ "${TRIVY_UPLOAD_OUTCOME}" = "failure" ]; then
            echo "::error title=SARIF upload failed::Uploading trivy-results.sarif to GitHub Security failed. Check upload step logs for API or SARIF validation details."
          fi

          if [ ! -f trivy-results.json ]; then
            echo "::error title=Missing Trivy JSON output::Expected trivy-results.json was not found in the workspace."
          fi

          if [ ! -f trivy-results.sarif ]; then
            echo "::error title=Missing Trivy SARIF output::Expected trivy-results.sarif was not found in the workspace."
          fi
      # S6: gosec removed — it ran with || true (can never fail) and was pure noise.
      # govulncheck in security-scan.yaml covers Go CVEs more reliably.

  build-windows:
    needs: [resolve-pr, security-scan]
    # S5: caller job must grant at least the permissions the reusable workflow requests.
    # The nested build job needs contents:read (checkout) and actions:write (upload-artifact).
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/_build.yaml
    with:
      artifact-name: 'dr-windows-fork'
      ref: ${{ needs.resolve-pr.outputs.sha }}
    # S1: _build.yaml declares no secrets — omit secrets entirely.

  notify-start:
    needs: [resolve-pr, security-scan]
    if: needs.resolve-pr.outputs.is_fork == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Notify smoke tests started
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            // Check if any changed files are under .github/
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ inputs.pr_number }},
            });
            const githubDirChanged = files.some(f => f.filename.startsWith('.github/'));

            let warning = '';
            if (githubDirChanged) {
              const changedWorkflows = files
                .filter(f => f.filename.startsWith('.github/'))
                .map(f => `  - \`${f.filename}\``)
                .join('\n');
              warning = '\n\n> [!WARNING]\n' +
                        '> **This PR modifies files under `.github/`**, which may alter CI workflows, ' +
                        'branch protection rules, or secrets handling. Review these changes carefully ' +
                        'before proceeding — malicious workflow changes could exfiltrate secrets.\n>\n' +
                        '> Changed files:\n' +
                        changedWorkflows.split('\n').map(l => '> ' + l).join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr_number }},
              body: '🔐 **Fork smoke tests started by maintainer**\n\n' +
                    '⏳ Security scans passed. Running smoke tests...\n\n' +
                    `Commit: \`${{ needs.resolve-pr.outputs.sha }}\`\n` +
                    `[View run](${context.payload.repository.html_url}/actions/runs/${context.runId})` +
                    warning
            });

  linux-smoke-tests:
    needs: [resolve-pr, security-scan]
    # S5: caller job must grant at least what the reusable workflow requests (contents:read).
    permissions:
      contents: read
    uses: ./.github/workflows/_smoke.yaml
    with:
      ref: ${{ needs.resolve-pr.outputs.sha }}
      install-deps: true
      install-bin: true
      needs-token: true
      test-script: 'task smoke-test DR_API_TOKEN="$DR_API_TOKEN"'
    # S1: pass only the one secret that smoke tests actually require.
    secrets:
      DR_API_TOKEN: ${{ secrets.DR_API_TOKEN }}

  windows-smoke-tests:
    needs: [resolve-pr, security-scan, build-windows]
    # S5: caller job must grant at least what the reusable workflow requests (contents:read).
    permissions:
      contents: read
    uses: ./.github/workflows/_smoke-windows.yaml
    with:
      artifact-name: 'dr-windows-fork'
      ref: ${{ needs.resolve-pr.outputs.sha }}
    # S1: pass only the one secret that smoke tests actually require.
    secrets:
      DR_API_TOKEN: ${{ secrets.DR_API_TOKEN }}

  notify-results:
    needs: [resolve-pr, security-scan, notify-start, linux-smoke-tests, windows-smoke-tests]
    if: always() && needs.resolve-pr.outputs.is_fork == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      issues: write
      statuses: write
    steps:
      - name: Comment on PR with results
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const securityStatus = '${{ needs.security-scan.result }}';
            const linuxStatus = '${{ needs.linux-smoke-tests.result }}';
            const windowsStatus = '${{ needs.windows-smoke-tests.result }}';

            const securityEmoji = securityStatus === 'success' ? '✅' : '❌';
            const linuxEmoji = linuxStatus === 'success' ? '✅' : '❌';
            const windowsEmoji = windowsStatus === 'success' ? '✅' : '❌';

            const allPassed = securityStatus === 'success' && linuxStatus === 'success' && windowsStatus === 'success';
            const overallEmoji = allPassed ? '✅' : '❌';
            const overallMessage = allPassed ? 'All smoke tests passed!' : 'Some smoke tests failed.';

            let failureNote = '';
            if (securityStatus === 'failure') {
              failureNote = '\n\n⚠️ **Security vulnerabilities detected!** Check the Security tab for details.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr_number }},
              body: `${overallEmoji} **${overallMessage}** (Fork PR)\n\n` +
                    `${securityEmoji} Security Scan: ${securityStatus}\n` +
                    `${linuxEmoji} Linux: ${linuxStatus}\n` +
                    `${windowsEmoji} Windows: ${windowsStatus}\n\n` +
                    `[View run details](${context.payload.repository.html_url}/actions/runs/${context.runId})` +
                    failureNote
            });

      - name: Update Smoke Tests commit status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const securityStatus = '${{ needs.security-scan.result }}';
            const linuxStatus = '${{ needs.linux-smoke-tests.result }}';
            const windowsStatus = '${{ needs.windows-smoke-tests.result }}';
            const allPassed = securityStatus === 'success' && linuxStatus === 'success' && windowsStatus === 'success';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ needs.resolve-pr.outputs.sha }}',
              state: allPassed ? 'success' : 'failure',
              context: 'Smoke Tests',
              description: allPassed ? 'All smoke tests passed' : 'Smoke tests failed',
            });
