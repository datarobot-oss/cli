name: Install Integration Tests Matrix

on:
  workflow_call:

# S5: deny all by default; jobs opt-in to what they need.
permissions:
  contents: read

jobs:
  install-integration-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Install Integration Tests (${{ matrix.os }})
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go and Task
        uses: datarobot-oss/cli/.github/actions/setup@main

      - name: Build binary
        run: task build

      - name: Run install integration tests
        run: |
          LOCAL_BINARY=./dist/dr bash smoke_test_scripts/run_install_integration_test.sh
