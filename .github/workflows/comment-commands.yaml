name: Comment Commands

on:
  issue_comment:
    types: [created]

jobs:
  handle-comment:
    # Only run on PRs (not issues) and not from forks
    # Note: issue_comment events don't have pull_request context, need to check differently
    if: github.event.issue.pull_request
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: write
      issues: write
      statuses: write
    steps:
      - name: Check if PR is from fork and commenter permissions
        id: check-fork
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const isFork = pr.data.head.repo.full_name !== context.repo.owner + '/' + context.repo.repo;
            core.setOutput('is_fork', isFork);

            // Check if commenter is a maintainer (write or admin permission)
            const permission = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });
            const isMaintainer = ['write', 'admin'].includes(permission.data.permission);
            core.setOutput('is_maintainer', isMaintainer);

            return { isFork, isMaintainer };

      - name: Handle smoke test command
        if: |
          (contains(github.event.comment.body, '/trigger-smoke-test') ||
           contains(github.event.comment.body, '/trigger-test-smoke')) &&
          steps.check-fork.outputs.is_fork == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            // Add reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

            // Add label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['run-smoke-tests']
            });

      - name: Handle install test command
        if: |
          (contains(github.event.comment.body, '/trigger-install-test') ||
           contains(github.event.comment.body, '/trigger-test-install')) &&
          steps.check-fork.outputs.is_fork == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            // Add reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'package'
            });

            // Add label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['run-install-tests']
            });

      - name: Handle fork smoke test approval (maintainers only)
        if: |
          (contains(github.event.comment.body, '/approve-smoke-tests') ||
           contains(github.event.comment.body, '/approve-fork-tests')) &&
          steps.check-fork.outputs.is_fork == 'true' &&
          steps.check-fork.outputs.is_maintainer == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Add reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

            // Trigger the fork smoke tests workflow via workflow_dispatch
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'fork-smoke-tests.yaml',
              ref: 'main',
              inputs: {
                pr_number: context.issue.number.toString(),
              }
            });

            // Check if any changed files are under .github/
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const githubDirChanged = files.some(f => f.filename.startsWith('.github/'));

            let warning = '';
            if (githubDirChanged) {
              const changedWorkflows = files
                .filter(f => f.filename.startsWith('.github/'))
                .map(f => `  - \`${f.filename}\``)
                .join('\n');
              warning = '\n\n> [!WARNING]\n' +
                        '> **This PR modifies files under `.github/`**, which may alter CI workflows, ' +
                        'branch protection rules, or secrets handling. Review these changes carefully ' +
                        'before proceeding — malicious workflow changes could exfiltrate secrets.\n>\n' +
                        '> Changed files:\n' +
                        changedWorkflows.split('\n').map(l => '> ' + l).join('\n');
            }

            // Add comment explaining what happens next
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🔐 **Fork PR smoke tests triggered by @' + context.actor + '**\n\n' +
                    '⚠️ **Security Notice**: This will run tests with access to repository secrets.\n\n' +
                    '**What happens next:**\n' +
                    '1. Security scans will run automatically (Trivy, gosec)\n' +
                    '2. If security scans pass, smoke tests will run\n' +
                    '3. Results will be posted as PR comments\n\n' +
                    '⚠️ **Important**: Review the PR code carefully before approving!' +
                    warning
            });

      - name: Handle skip smoke tests command (maintainers only)
        if: |
          contains(github.event.comment.body, '/skip-smoke-tests') &&
          steps.check-fork.outputs.is_maintainer == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Add reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '+1'
            });

            // Resolve PR head SHA
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            // Set commit status to success
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pr.data.head.sha,
              state: 'success',
              context: 'Smoke Tests',
              description: 'Skipped by @' + context.actor,
            });

      - name: Handle unauthorized skip smoke tests attempt
        if: |
          contains(github.event.comment.body, '/skip-smoke-tests') &&
          steps.check-fork.outputs.is_maintainer == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            // Add reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'confused'
            });

            // Add comment explaining permissions
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ **Insufficient permissions**\n\n' +
                    'Only maintainers with write or admin access can skip smoke tests.'
            });

      - name: Handle unauthorized fork smoke test attempt
        if: |
          (contains(github.event.comment.body, '/approve-smoke-tests') ||
           contains(github.event.comment.body, '/approve-fork-tests')) &&
          steps.check-fork.outputs.is_maintainer == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            // Add reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'confused'
            });

            // Add comment explaining permissions
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ **Insufficient permissions**\n\n' +
                    'Only maintainers with write or admin access can approve fork PRs for smoke tests.\n\n' +
                    'Please wait for a maintainer to review and approve.'
            });
