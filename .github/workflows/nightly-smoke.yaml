name: Daily Smoke Tests

concurrency:
  group: ${{ github.ref_name }}-smoke
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */4 * * 1-5'
  workflow_dispatch: # Allow manual trigger
    inputs:
      debug_brew:
        description: 'Enable verbose brew debug step on macOS (self-update tests)'
        type: boolean
        default: false

# S5: deny all by default; jobs opt-in to what they need.
permissions:
  contents: read

jobs:
  build-windows:
    # S5: caller job must grant at least what the reusable workflow requests.
    # _build.yaml needs contents:read (checkout) and actions:write (upload-artifact).
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/_build.yaml
    with:
      artifact-name: 'dr-windows'
    # S1: called workflow declares no secrets — omit secrets block.
  smoke-test:
    uses: ./.github/workflows/_smoke.yaml
    with:
      install-deps: true
      install-bin: true
      needs-token: true
      test-script: 'task smoke-test DR_API_TOKEN="$DR_API_TOKEN"'
    secrets:
      DR_API_TOKEN: ${{ secrets.DR_API_TOKEN }}

  windows-smoke-test:
    needs: build-windows
    uses: ./.github/workflows/_smoke-windows.yaml
    with:
      artifact-name: 'dr-windows'
    secrets:
      DR_API_TOKEN: ${{ secrets.DR_API_TOKEN }}

  installs-smoke-test:
    uses: ./.github/workflows/_install-tests.yaml

  self-update-smoke-test:
    uses: ./.github/workflows/_smoke.yaml
    with:
      job-name: 'Self-Update Smoke Tests'
      setup: false
      debug-brew: ${{ inputs.debug_brew || false }}
      test-script: './smoke_test_scripts/run_self_update_smoke_test.sh'

  notify-failure:
    needs: [build-windows, smoke-test, windows-smoke-test, installs-smoke-test, self-update-smoke-test]
    if: failure()
    runs-on: ubuntu-latest
    name: Notify Slack on Failure
    timeout-minutes: 5
    steps:
      - name: Build failed jobs summary
        id: summary
        run: |
          failed=""
          if [[ "${{ needs.build-windows.result }}" == "failure" ]]; then
            failed="${failed}Build Windows, "
          fi
          if [[ "${{ needs.smoke-test.result }}" == "failure" ]]; then
            failed="${failed}Smoke Tests, "
          fi
          if [[ "${{ needs.windows-smoke-test.result }}" == "failure" ]]; then
            failed="${failed}Windows Smoke Tests, "
          fi
          if [[ "${{ needs.installs-smoke-test.result }}" == "failure" ]]; then
            failed="${failed}Installation Tests, "
          fi
          if [[ "${{ needs.self-update-smoke-test.result }}" == "failure" ]]; then
            failed="${failed}Self-Update Tests, "
          fi
          # Trim trailing comma+space
          failed="${failed%, }"
          if [[ -z "$failed" ]]; then
            failed="(unknown — check workflow run)"
          fi
          echo "failed_jobs=${failed}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ DR CLI Daily Smoke Tests Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ DR CLI Daily Smoke Tests Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n<${{ github.event.repository.html_url }}|${{ github.repository }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Trigger:*\n${{ github.event_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.event.repository.html_url }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Failed Jobs:*\n${{ steps.summary.outputs.failed_jobs }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}|View Workflow Run>"
                  }
                }
              ]
            }
