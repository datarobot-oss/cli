name: On-Demand Installation Tests

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Specific version to install (e.g., v0.2.49). If empty, installs latest.'
        required: false
        type: string
        default: ''

# S5: deny all by default; jobs opt-in to what they need.
permissions:
  contents: read

jobs:
  installation-tests:
    uses: ./.github/workflows/.installation-tests-matrix.yaml
    with:
      version: ${{ inputs.version }}
    # S1: called workflow declares no secrets — omit secrets block.