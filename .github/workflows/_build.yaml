name: Build (Reusable)

# Single cross-compile build path. Merges the former native build matrix
# (.build-matrix.yaml) and the GoReleaser Windows build (.build-windows.yaml):
# GoReleaser cross-compiles every target on one ubuntu runner. The Windows
# binary is uploaded as an artifact for the Windows smoke-test job to consume.

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Name for the uploaded Windows binary artifact.'
        required: false
        type: string
        default: 'dr-windows'
      ref:
        description: 'Git ref to checkout (for fork PRs). Defaults to the triggering ref.'
        required: false
        type: string

# S5: deny all by default; jobs opt-in to what they need.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Cross-compile Binaries with GoReleaser
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write   # upload-artifact
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Go and Task
        uses: datarobot-oss/cli/.github/actions/setup@main

      - name: Cross-compile binaries with GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean --skip homebrew --skip archive

      - name: Upload Windows Binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/windows_windows_amd64_v1/dr.exe
          retention-days: 1
