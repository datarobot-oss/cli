name: Build Windows Binary

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.26.4'
      artifact-name:
        description: 'Name for the artifact'
        required: false
        type: string
        default: 'dr-windows'
      ref:
        description: 'Git ref to checkout (for fork PRs)'
        required: false
        type: string

# S5: deny all by default; jobs opt-in to what they need.
permissions:
  contents: read

jobs:
  build-windows:
    runs-on: ubuntu-latest
    name: Build Windows Binary with GoReleaser
    permissions:
      contents: read
      actions: write   # upload-artifact
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Taskfile
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Build Windows Binary with GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean --skip homebrew --skip archive

      - name: Upload Windows Binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/windows_windows_amd64_v1/dr.exe
          retention-days: 1
