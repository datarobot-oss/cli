name: PR Checks

concurrency:
  group: ${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main

# S5: deny all by default; jobs opt-in to what they need.
permissions:
  contents: read

jobs:

  # This job detects what types of files were changed in the PR and sets outputs
  # that other jobs can use to conditionally run only when relevant files were changed.
  detect-changes:
    runs-on: ubuntu-latest
    name: Detect Changes
    timeout-minutes: 5
    outputs:
      completion: ${{ steps.changes.outputs.completion }}
      dotenv: ${{ steps.changes.outputs.dotenv }}
      templates: ${{ steps.changes.outputs.templates }}
      auth: ${{ steps.changes.outputs.auth }}
      go_code: ${{ steps.changes.outputs.go_code }}
      deps: ${{ steps.changes.outputs.deps }}
      install_sh: ${{ steps.changes.outputs.install_sh }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect file changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          filters: |
            completion:
              - 'cmd/self/completion/**'
              - 'goreleaser.yaml'  # Homebrew post-install hook runs `dr self completion install`
            dotenv:
              - 'cmd/dotenv/**'
            templates:
              - 'cmd/templates/**'
            auth:
              - 'cmd/auth/**'
            go_code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            deps:
              - 'cmd/dependencies/**'
              - 'internal/dependencies/**'
              - 'internal/tools/**'
              - 'smoke_test_scripts/run_deps_install_smoke_test.sh'
            install_sh:
              - 'install.sh'
              - 'smoke_test_scripts/run_install_integration_test.sh'

  lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.go_code == 'true'
    runs-on: ubuntu-latest
    name: Lint Code
    timeout-minutes: 15
    permissions:
      contents: read
      actions: write   # actions/cache (save)

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go and Task
        uses: ./.github/actions/setup

      - name: Get golangci-lint version
        id: golangci-version
        run: |
          echo "version=$(grep 'GOLANGCI_LINT_VERSION' Taskfile.yaml | grep -oP 'v[\d.]+')" >> "$GITHUB_OUTPUT"

      - name: Cache golangci-lint binary and analysis
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            tmp/bin/golangci-lint
            tmp/bin/goreleaser
            ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ steps.golangci-version.outputs.version }}-${{ hashFiles('**/*.go', 'go.sum', '.golangci.yaml') }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-${{ steps.golangci-version.outputs.version }}-

      - name: Run all checks
        run: |
          task lint

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.go_code == 'true'
    runs-on: ubuntu-latest
    name: Run Tests
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # P1: setup-go's built-in cache replaces the manual actions/cache step.
      - name: Set up Go and Task
        uses: ./.github/actions/setup

      - name: Run Golang Test Command
        run: |
          task test

  copyright:
    runs-on: ubuntu-latest
    name: Copyrights
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check License Header
        uses: apache/skywalking-eyes/header@61275cc80d0798a405cb070f7d3a8aaf7cf2c2c1 # v0.8.0
        with:
          config: .licenserc.yaml

  generate:
    needs: detect-changes
    if: needs.detect-changes.outputs.go_code == 'true'
    runs-on: ubuntu-latest
    name: Ensure Code Generated
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go and Task
        uses: ./.github/actions/setup

      - name: Install Envdoc
        run: |
          go install github.com/g4s8/envdoc@latest

      - name: Add Go Bin to PATH
        run: |
          echo "${{ github.workspace }}/go/bin" >> "$GITHUB_PATH"

      - name: Ensure Code Generated
        run: |
          task gen-check

  build:
    needs: detect-changes
    name: Build Binaries
    # Cross-compile all platforms on a single Ubuntu runner (cheaper than 3-OS matrix).
    # Completion-tests depends on this job for the dr-ubuntu artifact.
    if: needs.detect-changes.outputs.go_code == 'true' || needs.detect-changes.outputs.completion == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # GoReleaser drives the build, so Task is not needed here.
      - name: Set up Go
        uses: ./.github/actions/setup
        with:
          install-task: 'false'

      - name: Build all platforms with GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --snapshot --clean

      - name: Verify Linux binary runs
        run: ./dist/linux_linux_amd64_v1/dr --help

      - name: Upload Linux binary (used by completion-tests)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dr-ubuntu
          path: dist/linux_linux_amd64_v1/dr
          retention-days: 1
  auto-label:
    needs: detect-changes
    if: needs.detect-changes.outputs.go_code == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    name: Auto Label Go Changes
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Add label for Go code changes
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['go']
            })

  dependabot-reminder:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    name: Dependabot Smoke Test Reminder
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Comment smoke test instructions
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '👋 **Maintainer reminder:** Smoke tests cannot run automatically on dependabot PRs due to GitHub secret restrictions.\n\nBefore merging, add the `run-smoke-tests` label and wait for the smoke tests to pass.'
            });

  deps-install-smoke-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.deps == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/_smoke.yaml
    with:
      job-name: 'Dependency Install Smoke Tests'
      build: true
      test-script: 'DR_BIN=./dist/dr bash smoke_test_scripts/run_deps_install_smoke_test.sh'
    # S1: _smoke.yaml's DR_API_TOKEN secret is optional; this suite needs none.
  install-integration-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.install_sh == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/_smoke.yaml
    with:
      job-name: 'Install Integration Tests'
      build: true
      test-script: 'LOCAL_BINARY=./dist/dr bash smoke_test_scripts/run_install_integration_test.sh'
    # S1: _smoke.yaml's DR_API_TOKEN secret is optional; this suite needs none.
  completion-tests:
    needs: [build, detect-changes]
    if: needs.detect-changes.outputs.completion == 'true'
    runs-on: ubuntu-latest
    name: Test Completions
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read    # actions/download-artifact

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dr-ubuntu
          path: /tmp/dr-bin

      - name: Move Binary to PATH
        run: |
          chmod +x /tmp/dr-bin/dr
          sudo mv /tmp/dr-bin/dr /usr/local/bin/dr

      - name: Install dependencies
        run: |
          # Runner image pre-seeds MS apt sources (azure-cli/microsoft-prod); we don't use
          # them and they're a source of flaky/noisy apt-get update failures
          # (packages.microsoft.com sporadically serves a corrupted InRelease file).
          # Matching by content allows us to manage both legacy.list and deb822 .sources files.
          # NOTE: if we ever actually need an MS package repo, re-add it explicitly for that job.
          # NOTE: or true is used to avoid failing the step if no files are found to delete.
          sudo grep -rl 'packages.microsoft.com' /etc/apt/sources.list.d/ 2>/dev/null | xargs -r sudo rm -f || true
          sudo apt-get update
          sudo apt-get install -y expect bash-completion

      - name: Install Taskfile
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test completion generation
        shell: bash
        run: |
          # Test bash completion generation and content
          dr self completion bash > /tmp/dr-bash.sh

          # Check if we have the expected __start_dr() function
          if grep -q "__start_dr()" /tmp/dr-bash.sh; then
            echo "✓ Bash completion has expected __start_dr() function"
          else
            echo "✗ Bash completion missing __start_dr() function"
            exit 1
          fi

          # Validate bash syntax
          bash -n /tmp/dr-bash.sh && echo "✓ Bash completion syntax valid"


      - name: Run completion expect tests
        run: |
          expect ./smoke_test_scripts/expect_completion.exp
