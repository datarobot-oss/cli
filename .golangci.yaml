version: "2"
run:
  go: 1.26.5
linters:
  enable:
    - asasalint
    - forbidigo
    - bodyclose
    - contextcheck
    - cyclop
    - depguard
    - dupword
    - errname
    - errorlint
    - exhaustive
    # - godot # disabled until we can resolve lints
    # - godox # disabled until we can resolve lints
    # - gosec # disabled until we can resolve lints
    - loggercheck
    - misspell
    - nestif
    - nolintlint
    - perfsprint
    - prealloc
    - predeclared
    - revive
    - testifylint
    - unconvert
    - usestdlibvars
    # - wrapcheck # disabled until we can resolve lints
    - wsl_v5
  settings:
    forbidigo:
      forbid:
        - pattern: '^os\.Exit$'
          msg: >-
            Call telemetry.Exit() instead of os.Exit() so pending telemetry is
            flushed before the process exits. Only main.go and
            internal/telemetry/telemetry.go may call os.Exit directly.
        - pattern: '^log\.Fatal(f|ln)?$'
          msg: >-
            log.Fatal/Fatalf calls os.Exit internally and bypasses telemetry
            flush. Return an error or call telemetry.Exit(1) instead.
    depguard:
      rules:
        no-raw-viper:
          # Production and test code outside internal/config/** must not
          # import viper directly. Use internal/config/viperx instead,
          # which exposes only the safe subset of viper's API (no
          # WriteConfig / SafeWriteConfig / BindPFlags). See
          # docs/development/configuration.md for the full contract.
          list-mode: lax
          files:
            - "!**/internal/config/**"
          deny:
            - pkg: github.com/spf13/viper
              desc: >-
                Import internal/config/viperx instead of github.com/spf13/viper.
                The wrapper omits WriteConfig, SafeWriteConfig, and BindPFlags
                by design so transient flag state cannot leak into
                drconfig.yaml. See docs/development/configuration.md.
    # TODO uncomment this for CFX-6070
    # errcheck:
    #   check-blank: true
    revive:
      rules:
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#error-strings
        - name: error-strings
          severity: warning
          disabled: true
          exclude: [""]
          arguments:
            - "xerrors.New"
    staticcheck:
      checks: [ "all", "-ST1005"]
    govet:
      enable:
        - nilness
        - reflectvaluecompare
        - sortslice
        - unusedwrite
        - defers
        - atomic
        - nilfunc
        - printf
        - sortslice
        - tests
  exclusions:
    rules:
      - linters: [forbidigo]
        path: "^main\\.go$|internal/telemetry/telemetry\\.go|internal/log/pkg\\.go|_test\\.go$"
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - \.claude/.*
