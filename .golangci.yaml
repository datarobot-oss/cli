version: "2"
run:
  go: 1.26.2
linters:
  enable:
    - asasalint
    - bodyclose
    - contextcheck
    - cyclop
    - depguard
    - dupword
    - errname
    - exhaustive
    - loggercheck
    - misspell
    - nestif
    - nolintlint
    - perfsprint
    - prealloc
    - predeclared
    - revive
    - testifylint
    - unconvert
    - usestdlibvars
    - wsl_v5
  settings:
    depguard:
      rules:
        no-raw-viper:
          # Production and test code outside internal/config/** must not
          # import viper directly. Use internal/config/viperx instead,
          # which exposes only the safe subset of viper's API (no
          # WriteConfig / SafeWriteConfig / BindPFlags). See
          # docs/development/configuration.md for the full contract.
          list-mode: lax
          files:
            - "!**/internal/config/**"
          deny:
            - pkg: github.com/spf13/viper
              desc: >-
                Import internal/config/viperx instead of github.com/spf13/viper.
                The wrapper omits WriteConfig, SafeWriteConfig, and BindPFlags
                by design so transient flag state cannot leak into
                drconfig.yaml. See docs/development/configuration.md.
    revive:
      rules:
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#error-strings
        - name: error-strings
          severity: warning
          disabled: true
          exclude: [""]
          arguments:
            - "xerrors.New"
    staticcheck:
      checks: [ "all", "-ST1005"]
    govet:
      enable:
        - nilness
        - reflectvaluecompare
        - sortslice
        - unusedwrite
        - defers
        - atomic
        - nilfunc
        - printf
        - sortslice
        - tests
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
