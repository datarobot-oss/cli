# Lefthook configuration for the DataRobot CLI
# Docs: https://github.com/evilmartians/lefthook
#
# Setup:
#   task install-tools  # installs lefthook to tmp/bin
#   task dev-init       # runs lefthook install automatically
#
# Run manually:
#   lefthook run pre-commit
#
# Bypass for a single commit (use sparingly):
#   LEFTHOOK=0 git commit ...

pre-commit:
  parallel: false
  commands:
    go-checks:
      glob: "*.go"
      run: task precommit
    dupcheck:
      glob: "*.go"
      run: task dupcheck
